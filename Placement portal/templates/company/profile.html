{% extends "base.html" %}

{% block content %}
<h2>Company Profile</h2>
<form method="POST">
    <div class="mb-3">
        <label>Company Name</label>
        <input type="text" name="company_name" value="{{ comp.company_name if comp else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>HR Contact</label>
        <input type="text" name="hr_contact" value="{{ comp.hr_contact if comp else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>Website</label>
        <input type="text" name="website" value="{{ comp.website if comp else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>Details</label>
        <textarea name="details" class="form-control" rows="3">{{ comp.details if comp else '' }}</textarea>
    </div>
    <button class="btn btn-success">Save</button>
</form>
{% endblock %}
