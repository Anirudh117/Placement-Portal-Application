{% extends "base.html" %}

{% block content %}
<h2>Student Profile</h2>
<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label>Contact</label>
        <input type="text" name="contact" value="{{ student.contact if student else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>Course</label>
        <input type="text" name="course" value="{{ student.course if student else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>CGPA</label>
        <input type="number" step="0.01" name="cgpa" value="{{ student.cgpa if student else '' }}" class="form-control">
    </div>
    <div class="mb-3">
        <label>Resume (pdf/doc)</label>
        <input type="file" name="resume" class="form-control">
        {% if student and student.resume %}
            <p>Current: <a href="{{ url_for('static', filename='uploads/resumes/' ~ student.resume) }}" target="_blank">{{ student.resume }}</a></p>
        {% endif %}
    </div>
    <button class="btn btn-success">Save</button>
</form>
{% endblock %}
